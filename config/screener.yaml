# ════════════════════════════════════════════════════════════════════════
#  종목 조건 검색 설정 — 이 파일만 수정하면 코드 변경 없이 조건이 바뀝니다.
# ════════════════════════════════════════════════════════════════════════
#
#  사용법:
#    - strategies 아래에 원하는 전략을 추가/수정/삭제하세요.
#    - 각 전략의 conditions를 모두 만족(AND)하는 종목만 매수 후보로 선정됩니다.
#    - enabled: false 로 두면 해당 전략은 건너뜁니다.
#
#  사용 가능한 조건 (conditions):
#    ma_alignment:      정배열 (periods 순서대로 위>아래). periods 지정 가능
#    pullback:          눌림목 (상승추세 중 MA선 근접 + RSI 과열 아님)
#    breakout:          돌파 (N일 고가 갱신 + 거래량 증가)
#    volume_surge:      거래량 급증 (직전 평균 대비 N배)
#    above_ichimoku:    일목구름 위 (양운 상승)
#    bollinger_breakout: 볼린저밴드 상단 돌파
#    rsi_between:        RSI 범위 [min, max]
#    price_above_ma:    현재가 > 특정 MA (period 지정)
#    change_pct_between: 당일 등락률 범위 [min, max] %
#
# ════════════════════════════════════════════════════════════════════════

# 검색 대상 유니버스
universe:
  watchlist: true       # 내 관심종목 포함
  hot_stocks: true      # 당일 핫종목(거래량·등락률 상위) 포함
  hot_stocks_top: 30    # 핫종목 상위 N개

# 전략 목록 — 각 전략이 독립적으로 후보를 추출
strategies:

  - name: "정배열 눌림목"
    enabled: true
    description: "상승추세(정배열) 중 MA20 눌림목, 과매수 아닌 매수 타이밍"
    conditions:
      ma_alignment:
        periods: [5, 20, 60]
      pullback:
        ma_period: 20
        tolerance: 0.03      # MA20 ±3% 이내
        rsi_max: 55
    opinion: "매수 관심"      # 조건 충족 시 의견 라벨

  - name: "거래량 돌파"
    enabled: true
    description: "20일 고가 돌파 + 거래량 1.5배 이상 (추세 전환 신호)"
    conditions:
      breakout:
        lookback: 20
        vol_mult: 1.5
      above_ichimoku: true
    opinion: "매수 관심"

  - name: "종가 베팅 (과매도 반등)"
    enabled: true
    description: "거래량 급증 + RSI 과매도 구간 (마감 전 단기 반등 노림)"
    conditions:
      volume_surge:
        lookback: 5
        mult: 2.0
      rsi_between: [25, 45]
      change_pct_between: [-7, 3]
    opinion: "단기 관심 (종가 베팅)"

  # 예시 — 비활성. 필요하면 enabled: true 로 켜세요.
  - name: "볼린저 상단 돌파"
    enabled: false
    description: "볼린저밴드 상단 돌파 + 정배열"
    conditions:
      bollinger_breakout:
        period: 20
        num_std: 2.0
      ma_alignment:
        periods: [5, 20]
    opinion: "매수 관심"

# 공통 필터 (모든 전략에 추가 적용, 선택)
global_filters:
  min_price: 1000          # 최소 주가 (동전주 제외)
  exclude_etf: true        # ETF/ETN 제외 (이름에 KODEX/TIGER 등 포함 시)
