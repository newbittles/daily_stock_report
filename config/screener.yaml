# ════════════════════════════════════════════════════════════════════════
#  종목 조건 검색 설정 — 이 파일만 수정하면 코드 변경 없이 조건이 바뀝니다.
# ════════════════════════════════════════════════════════════════════════
#
#  사용법:
#    - strategies 아래에 원하는 전략을 추가/수정/삭제하세요.
#    - 각 전략의 conditions를 모두 만족(AND)하는 종목만 매수 후보로 선정됩니다.
#    - enabled: false 로 두면 해당 전략은 건너뜁니다.
#
#  사용 가능한 조건 (conditions):
#    ma_alignment {periods}        정배열 (periods 순서대로 위>아래)
#    weekly_ma_alignment {periods} 주봉 정배열 (멀티 타임프레임)
#    pullback {ma_period, tolerance, rsi_max}  눌림목
#    breakout {lookback, vol_mult} 돌파 (N일 고가 갱신 + 거래량 증가)
#    volume_surge {lookback, mult} 거래량 급증
#    above_ichimoku                일목구름 위 (양운 상승)
#    bollinger_breakout {period, num_std}  볼린저 상단 돌파
#    macd_golden_cross {within, above_zero}  MACD 골든크로스 (0선 위 옵션)
#    near_high {lookback, tolerance}  신고가 근접 (52주=lookback 250)
#    rsi_between [min, max]         RSI 범위
#    price_above_ma {period}        현재가 > 특정 MA
#    low_above_ma {period}          당일 저가 >= MA (지지선 유지)
#    change_pct_between [min, max]  당일 등락률 범위 %
#    min_trade_value <원>           당일 거래대금 하한 (예: 5000000000 = 50억)
#
# ════════════════════════════════════════════════════════════════════════

universe:
  watchlist: true            # 관심종목(/watch 등록) 포함
  hot_stocks: true           # 당일 핫종목(거래량·등락률 순위) — 소형 급등주 포착
  hot_stocks_top: 40
  market_cap: true                  # 시총 상위 풀 (HTS식 디텍팅 — 숨은 포텐셜 종목)
  market_cap_kospi: 200             # 코스피 시총 상위 N
  market_cap_kosdaq: 100            # 코스닥 시총 상위 N
  market_cap_min_amount: 50000000000  # 당일 거래대금 하한 500억 → 활발한 ~150종목(스캔 ~5분)

strategies:

  # ── A. 수렴 후 대세상승 시작 (추세 초입) ────────────────────────────────
  # 사용자 매수사례 15개 역산 (포착 14/15=93%). 박스권 횡보(이평 수렴) 깨고 상승전환.
  # 흐름: ① 단기이평(5/10/20) 수렴 → ② 종가가 그 위로 상승전환 → ③ 종가>120선 진입.
  # 핵심교훈: '정배열 완성'이 아니라 '수렴 후 막 상승전환'이 진입점.
  #   - 60>120 장기정배열·신고가·120선우상향은 제외 (바닥탈출 대박 대우건설+654% 보존).
  #   - MACD는 약한필수(하락중이면 제외)+상태알림(0선돌파/GC/상승). 방향(상승)이 93% 공통.
  # 청산(별도 운영): 손절 20선2일이탈 / 익절 MACD+20선·일목구름. scripts/backtest_A.py 참고.
  # ※ 아래 파라미터를 수정해 조건을 조정할 수 있음 (코드 변경 불필요).
  - name: "A. 수렴 후 대세상승 시작"
    enabled: true
    description: "이평선 수렴(박스권) 깨고 정배열 대세상승 시작 (수렴 + 종가 이평선 위 + 120선 위)"
    conditions:
      convergence_breakout:
        conv_max: 6.0              # 단기이평(5/10/20) 수렴 이격 상한 %
        gap120_min: 2.0            # 종가>120선 최소 이격 % (장기추세 위)
        # gap120_max: 생략          # 이격 상한 없음 (이미 오른 추세주 안 거름)
        strict_align: false        # false=종가 이평선 위(상승전환) / true=5>10>20 정배열
        require_new_high: false    # 신고가 경신 요구 (바닥탈출 대박 죽여서 기본 off)
        require_ma120_rising: false # 120선 우상향 요구 (바닥탈출 죽여서 기본 off)
        reject_macd_falling: true  # MACD 하락중이면 제외 (약한필수)
        enable_vol_breakout: false # 수렴깨진 거래량 돌파 OR경로 (노이즈만 늘려 기본 off)
      min_trade_value: 3000000000  # 거래대금 30억 이상
    opinion: "대세상승 진입 (A) · 청산=20선/MACD/일목"

  # ── B. 주도주 20일선 눌림목 (가격급등 후 눌림) ───────────────────────────
  # 사용자 사례(미래에셋·한화솔루션·삼성전기·SK하이닉스·삼화콘덴서 등) 역산.
  # 급등 정의 = 가격 기준 (10일 내 +15%) — 대형주도 포착, 거래량 무관.
  # 흐름: ① 가격 급등(한번의 급등) → ② 20일선 위 유지 → ③ 5일선 아래 눌림 → 매수.
  # 손절: 2일 연속 종가 20일선 이탈 (일시적 1일 이탈 무시). 단타 아님 → 관심등록.
  # MACD·일목·거래량 제외 — 이평선·가격·캔들로만 판단 (사용자 요청).
  - name: "B. 주도주 20일선 눌림목"
    enabled: true
    description: "가격 급등(10일+15%) 후 20일선 위에서 5일선 눌림 중인 주도주"
    conditions:
      ma20_pullback:
        ma_period: 20
        surge_lookback: 10        # 최근 10일 내
        surge_pct: 15.0           # 단기저점→고점 +15% 이상 (가격 급등)
        max_gap: 0.45             # 20일선 +45% 이내 (급등 정점 추격 방지)
        require_below_ma5: true   # 5일선 아래 (단기 눌림 진입)
        min_pullback_pct: 2.0     # 5일 고점 대비 -2% 이상 (실제 눌림)
        require_ma20_rising: true # 60일선 우상향 (중기 추세 — 하락추세 제외)
        require_new_high: true    # 급등 고점이 직전 60일 신고가 경신 (박스권 제외)
        new_high_lookback: 60
      min_trade_value: 3000000000
    opinion: "20일선 눌림목 (B) · 관심등록 · 손절=2일연속 20일선 이탈"

  # ── C. 대세 정배열 주도주 추세추종 (늦게 발견해도 진입) ──────────────────
  # 사용자 사례(삼성전기·SK하이닉스·LG이노텍·디엔디파마텍 등) 검증.
  # 핵심: 이미 한참 오른 주도주도 어느 날 진입하든 60일선만 안 깨면 +수십~수백%.
  #   - 삼성전기 26/4 발견 +166%, LG이노텍 +173%, SK하이닉스 +161%(60선이탈 2일뿐)
  # 진입: 정배열(5>10>20>60) + 신고가 근처. 손절: 60일선 2일연속 이탈(알림만, 매도는 본인).
  # 끝물 경고(진입 안 막음): '많이 올랐다'(절대 상승률)는 대세주 정상상태라 끝물 아님.
  #   진짜 끝물 = '올랐는데 동력이 꺾임'(모멘텀 소진):
  #     ① RSI 약세 다이버전스(가격↑ RSI↓)  ② 60선 이격 정점 통과(가속 종료)
  #   둘 중 하나 → ⚠️끝물주의 플래그. (절대 상승률 기준은 전 종목 오탐 → 폐기)
  - name: "C. 대세 정배열 추세추종"
    enabled: true
    description: "대세 정배열 주도주 — 늦게 발견해도 진입, 60일선 손절"
    conditions:
      trend_follow:
        nh_lookback: 60         # 신고가 판정 기간
        nh_tol: 0.03            # 신고가 -3% 이내
        div_lookback: 40        # 다이버전스/이격정점 비교 기간
        div_rsi_margin: 5.0     # RSI 다이버전스 최소 격차(pt) — 클수록 엄격
        rollover_peak_min: 50.0 # 이격 정점이 이 값 이상이어야 '과열' 인정(%)
        rollover_ratio: 0.55    # 정점 대비 이 비율 이하로 후퇴 시 '꺾임'
      min_trade_value: 3000000000
    opinion: "추세추종 (C) · 손절=60일선 2일이탈"

  # ── D. 추세 반전 (추세선 돌파의 객관적 대용) ────────────────────────────
  # 사용자 사례(NAVER 24/9/23·LG엔솔/LG전자 25/6~7·SK네트웍스/LG씨엔에스/에코프로) 역산.
  # '고점-고점 하락추세선 돌파'는 긋는 위치가 주관적 → 가장 잘 맞은 일목 구름(양운)
  #   상향 돌파를 주 신호로, 이평선·MACD로 노이즈 제거. (NAVER 0일·LG엔솔+1·LG전자+2 정확)
  # 진입: ① 하락이력(20<60 or 최근 구름아래/5<20) ② 5>20 회복 ③ MACD+ ④ 일목 구름 상향돌파.
  # 손절: 구름 하단 2일이탈(use_ichimoku) / 20일선 2일이탈. 가짜반등(에코프로)은 구름이 거름.
  # ※ use_ichimoku=false 로 두면 일목 대신 20일선 돌파 기준(노이즈 우려 시).
  - name: "D. 추세 반전"
    enabled: true
    description: "하락하던 종목이 일목 구름 상향 돌파 + 단기정배열 회복 + MACD 양전환 (추세반전 초입)"
    conditions:
      downtrend_reversal:
        downtrend_lookback: 20   # 하락 이력 확인 기간
        use_ichimoku: true       # true=일목 구름 돌파(주신호) / false=20일선 돌파(보조)
        cloud_shift: 26          # 일목 선행스팬 미래 시프트
      min_trade_value: 3000000000
    opinion: "추세 반전 (D) · 손절=60일선 2일이탈"

# 공통 필터 (모든 전략에 추가 적용)
global_filters:
  min_price: 1000          # 동전주 제외
  exclude_etf: true        # ETF/ETN/레버리지/인버스 제외
  min_trade_value: 300000000000   # 당일 거래대금 3000억 이상 (활발한 대형주만, 1억=1e8)
  min_market_cap: 300000000000    # 시가총액 3000억 이상 (소형주 제외)
